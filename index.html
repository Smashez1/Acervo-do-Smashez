<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bem-vindo ao Acervo do Smashez</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #12140F;
    --surface: #1C211A;
    --surface-2: #232920;
    --ink: #E8E4D9;
    --ink-dim: #8B9188;
    --rust: #C1502E;
    --moss: #4A5D3A;
    --line: #2C3226;
  }
  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  h1,h2,h3{ font-family: 'Big Shoulders Display', sans-serif; text-transform: uppercase; margin:0; }
  .mono{ font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.08em; }

  #ash{ position:fixed; inset:0; z-index:1; pointer-events:none; opacity:0.35; }

  /* ===== Fundo Matrix ===== */
  #matrix{
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.22;
    pointer-events: none;
  }

  /* ===== Botões de música ===== */
  #music-btn, #next-btn{
    position: fixed;
    top: 15px;
    padding: 10px 20px;
    border: 2px solid #0F0;
    color: #0F0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 8px;
    background: rgba(0, 255, 0, 0.15);
    transition: all 0.3s ease-in-out;
    z-index: 1000;
    text-shadow: 0 0 8px #0F0;
  }
  #music-btn{ left: 50%; transform: translateX(calc(-50% - 65px)); }
  #next-btn{ left: 50%; transform: translateX(calc(-50% + 65px)); padding: 10px 16px; }
  #music-btn:hover, #next-btn:hover{ background: rgba(0, 255, 0, 0.3); }

  /* ===== Volume ===== */
  #volume-container{
    position: fixed;
    top: 15px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 1000;
    padding: 10px 14px;
    border: 2px solid #0F0;
    border-radius: 8px;
    background: rgba(0, 255, 0, 0.15);
  }
  #volume-icon{ color: #0F0; font-size: 16px; text-shadow: 0 0 8px #0F0; }
  #volume-slider{ width: 100px; cursor: pointer; accent-color: #0F0; }

  .hero{
    position: relative;
    height: 92vh;
    min-height: 560px;
    overflow: hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    border-bottom: 1px solid var(--line);
  }
  .hero-img{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit: cover;
    filter: grayscale(35%) contrast(1.3) brightness(0.9) sepia(15%);
    transition: opacity 0.5s ease;
  }
  .hero::after{
    content:"";
    position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(18,20,15,0.15) 0%, rgba(18,20,15,0.55) 60%, var(--bg) 100%);
  }
  .hero-content{
    position:relative; z-index:2;
    padding: 0 6vw 5vw;
    max-width: 900px;
    width: 100%;
    text-align: center;
    margin: 0 auto;
  }
  .eyebrow{
    color: var(--rust);
    font-size: 13px;
    letter-spacing: 0.25em;
    margin-bottom: 14px;
  }
  .hero h1{
    font-size: clamp(56px, 11vw, 148px);
    font-weight: 800;
    line-height: 0.85;
    letter-spacing: -0.01em;
    color: #0F0;
    text-shadow: 0 0 12px #0F0, 0 0 32px #0F0, 0 0 64px rgba(0,255,0,0.4);
    transition: color 1s ease, text-shadow 1s ease;
  }
  .hero p{
    max-width: 480px;
    color: var(--ink-dim);
    font-size: 16px;
    line-height: 1.6;
    margin-top: 18px;
  }

  .sub-label{
    color: var(--ink-dim);
    font-size: 13px;
    letter-spacing: 0.3em;
    margin-top: 2px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .stamp{
    position: absolute;
    top: 32px; right: 6vw;
    z-index: 3;
    width: 132px; height: 132px;
    border: 3px solid var(--rust);
    border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    text-align:center;
    transform: rotate(-14deg);
    color: var(--rust);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    line-height: 1.4;
    opacity: 0.85;
    mix-blend-mode: screen;
  }
  .stamp::before{
    content:"";
    position:absolute; inset:-8px;
    border: 1px solid var(--rust);
    border-radius: 50%;
    opacity: 0.4;
  }

  .strip-section{ padding: 34px 0 10px; border-bottom: 1px solid var(--line); }
  .strip-wrap{
    display:flex; align-items:center; justify-content:center; gap: 14px; padding: 10px 6vw;
    border: 1px solid rgba(0,255,0,0.35);
    box-shadow: 0 0 4px rgba(0,255,0,0.25), inset 0 0 4px rgba(0,255,0,0.12);
    transition: border-color 0.4s ease, box-shadow 0.4s ease;
  }
  .arrow{
    flex: none;
    width: 40px; height: 40px;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink-dim);
    display:flex; align-items:center; justify-content:center;
    cursor: pointer;
    font-size: 16px;
    transition: 0.2s;
  }
  .arrow:hover{ border-color: var(--rust); color: var(--rust); }

  .strip{
    display:flex;
    gap: 10px;
    overflow-x: auto;
    scroll-behavior: smooth;
    cursor: grab;
    padding: 4px 0 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--moss) transparent;
  }
  .strip.dragging{ cursor: grabbing; scroll-behavior: auto; }
  .strip::-webkit-scrollbar{ height: 4px; }
  .strip::-webkit-scrollbar-thumb{ background: var(--moss); }

  .thumb{
    flex: none;
    width: 132px; height: 82px;
    object-fit: cover;
    border: 2px solid transparent;
    opacity: 0.55;
    filter: grayscale(40%);
    cursor: pointer;
    transition: 0.2s;
    user-select: none;
    -webkit-user-drag: none;
  }
  .thumb:hover{ opacity: 0.85; }
  .thumb.active{
    opacity: 1;
    border-color: var(--rust);
    filter: none;
  }
  .drag-hint{
    text-align:center;
    color: var(--ink-dim);
    font-size: 11px;
    letter-spacing: 0.15em;
    padding-bottom: 20px;
  }

  .section{ padding: 70px 6vw; }
  .section-head{ display:flex; align-items:baseline; gap: 16px; margin-bottom: 28px; }
  .section-head .idx{ color: var(--rust); font-size: 13px; }
  .section-head h2{ font-size: 34px; font-weight: 800; }
  .section-head .rule{ flex:1; height:1px; background: var(--line); }

  .player{
    position: relative;
    max-width: 1100px;
    margin: 0 auto;
    aspect-ratio: 16/9;
    background: var(--surface);
    border: 1px solid #0F0;
    box-shadow: 0 0 6px #0F0, 0 0 14px rgba(0,255,0,0.4), inset 0 0 6px rgba(0,255,0,0.25);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.4s ease, box-shadow 0.4s ease;
  }
  .player img, .player video{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit: cover;
    filter: grayscale(30%) brightness(0.65);
  }
  .player video{ display:none; filter:none; }
  .player.playing video{ display:block; }
  .player.playing img{ display:none; }
  .play-btn{
    position:relative; z-index:2;
    width: 84px; height:84px;
    border-radius: 50%;
    background: rgba(18,20,15,0.55);
    border: 1px solid var(--rust);
    color: var(--ink);
    display:flex; align-items:center; justify-content:center;
    margin: auto;
    top: calc(50% - 42px);
    transition: 0.2s;
  }
  .player:hover .play-btn{ background: var(--rust); transform: scale(1.06); }
  .player.playing .play-btn{ display:none; }
  .play-btn svg{ width:26px; height:26px; margin-left:4px; }

  .gallery{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    perspective: 1000px;
  }
  .gallery img{
    width:100%; aspect-ratio: 4/3;
    object-fit: cover;
    filter: grayscale(30%);
    opacity: 0;
    animation: fadein 0.5s ease forwards;
    cursor: pointer;
    transition: filter 0.2s, transform 0.08s ease-out, box-shadow 0.2s;
    transform-style: preserve-3d;
    will-change: transform;
  }
  .gallery img:hover{ filter:none; box-shadow: 0 8px 24px rgba(0,0,0,0.5), 0 0 18px rgba(193,80,46,0.35); }
  @keyframes fadein{ to{ opacity:1; } }

  .load-more-wrap{ text-align:center; margin-top: 30px; }
  .load-more{
    position: relative;
    overflow: hidden;
    background: rgba(0,255,0,0.06);
    border: 1px solid #0F0;
    color: #0F0;
    text-shadow: 0 0 6px #0F0;
    box-shadow: 0 0 6px rgba(0,255,0,0.35), inset 0 0 8px rgba(0,255,0,0.15);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.1em;
    font-size: 13px;
    padding: 14px 34px;
    cursor: pointer;
    transition: border-color 0.4s ease, box-shadow 0.4s ease, color 0.4s ease, background 0.2s ease;
  }
  .load-more:hover{ background: rgba(0,255,0,0.16); }
  .load-more:disabled{ opacity: 0.3; cursor: default; background: transparent; }
  .load-more .neon-ripple{
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: currentColor;
    opacity: 0;
    pointer-events: none;
  }
  .load-more.neon-tap .neon-ripple{
    animation: neonTap 0.5s ease-out;
  }
  @keyframes neonTap{
    0%{ opacity: 0.55; }
    100%{ opacity: 0; }
  }

  footer{
    text-align:center;
    color: var(--ink-dim);
    font-size: 11px;
    letter-spacing: 0.15em;
    padding: 40px 0 60px;
  }

  @media (max-width: 720px){
    .gallery{ grid-template-columns: repeat(2, 1fr); }
    .stamp{ width: 96px; height:96px; top: 24px; right: 24px; font-size: 9px; }
    .section{ padding: 50px 5vw; }
  }
  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior:auto; }
    .gallery img{ animation:none; opacity:1; }
  }
  /* ===== Efeito Glitch no nome ===== */
  #heroName{
    position: relative;
    display: inline-block;
  }
  #heroName::before,
  #heroName::after{
    content: attr(data-text);
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    color: inherit;
    background: var(--bg);
    opacity: 0;
    pointer-events: none;
  }
  #heroName.glitching::before{
    left: 3px;
    text-shadow: -2px 0 #ff003c;
    background: transparent;
    clip-path: polygon(0 15%, 100% 15%, 100% 20%, 0 20%);
    animation: glitchTop 0.4s steps(2, end) infinite;
    opacity: 0.9;
  }
  #heroName.glitching::after{
    left: -3px;
    text-shadow: 2px 0 #00fff9;
    background: transparent;
    clip-path: polygon(0 60%, 100% 60%, 100% 66%, 0 66%);
    animation: glitchBottom 0.35s steps(2, end) infinite;
    opacity: 0.9;
  }
  @keyframes glitchTop{
    0%{ clip-path: polygon(0 15%, 100% 15%, 100% 20%, 0 20%); transform: translate(-3px,-1px); }
    20%{ clip-path: polygon(0 45%, 100% 45%, 100% 52%, 0 52%); transform: translate(3px,1px); }
    40%{ clip-path: polygon(0 5%, 100% 5%, 100% 12%, 0 12%); transform: translate(-2px,0); }
    60%{ clip-path: polygon(0 70%, 100% 70%, 100% 78%, 0 78%); transform: translate(2px,1px); }
    80%{ clip-path: polygon(0 30%, 100% 30%, 100% 38%, 0 38%); transform: translate(-3px,-2px); }
    100%{ clip-path: polygon(0 85%, 100% 85%, 100% 90%, 0 90%); transform: translate(3px,0); }
  }
  @keyframes glitchBottom{
    0%{ clip-path: polygon(0 25%, 100% 25%, 100% 30%, 0 30%); transform: translate(2px,0); }
    25%{ clip-path: polygon(0 60%, 100% 60%, 100% 68%, 0 68%); transform: translate(-2px,1px); }
    50%{ clip-path: polygon(0 10%, 100% 10%, 100% 18%, 0 18%); transform: translate(3px,-1px); }
    75%{ clip-path: polygon(0 80%, 100% 80%, 100% 88%, 0 88%); transform: translate(-3px,1px); }
    100%{ clip-path: polygon(0 40%, 100% 40%, 100% 48%, 0 48%); transform: translate(2px,0); }
  }

  /* ===== Tela de entrada (Glitch Intro) ===== */
  #intro-overlay{
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #050705;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
  #intro-overlay.hidden{
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  #intro-text{
    position: relative;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: clamp(30px, 8vw, 76px);
    letter-spacing: 0.18em;
    color: #0F0;
    text-shadow: 0 0 10px #0F0, 0 0 30px rgba(0,255,0,0.5);
  }
  #intro-text::before,
  #intro-text::after{
    content: attr(data-text);
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #050705;
    color: #0F0;
  }
  #intro-text::before{
    left: 3px;
    text-shadow: -2px 0 #ff003c;
    clip-path: polygon(0 20%, 100% 20%, 100% 30%, 0 30%);
    animation: introGlitchTop 0.5s steps(2, end) infinite;
  }
  #intro-text::after{
    left: -3px;
    text-shadow: 2px 0 #00fff9;
    clip-path: polygon(0 55%, 100% 55%, 100% 65%, 0 65%);
    animation: introGlitchBottom 0.4s steps(2, end) infinite;
  }
  @keyframes introGlitchTop{
    0%{ clip-path: polygon(0 10%, 100% 10%, 100% 18%, 0 18%); transform: translate(-4px,0); }
    25%{ clip-path: polygon(0 40%, 100% 40%, 100% 50%, 0 50%); transform: translate(4px,1px); }
    50%{ clip-path: polygon(0 65%, 100% 65%, 100% 72%, 0 72%); transform: translate(-3px,-1px); }
    75%{ clip-path: polygon(0 20%, 100% 20%, 100% 28%, 0 28%); transform: translate(3px,0); }
    100%{ clip-path: polygon(0 80%, 100% 80%, 100% 88%, 0 88%); transform: translate(-4px,1px); }
  }
  @keyframes introGlitchBottom{
    0%{ clip-path: polygon(0 30%, 100% 30%, 100% 38%, 0 38%); transform: translate(3px,0); }
    33%{ clip-path: polygon(0 5%, 100% 5%, 100% 15%, 0 15%); transform: translate(-3px,1px); }
    66%{ clip-path: polygon(0 70%, 100% 70%, 100% 80%, 0 80%); transform: translate(3px,-1px); }
    100%{ clip-path: polygon(0 45%, 100% 45%, 100% 55%, 0 55%); transform: translate(-3px,0); }
  }
  #intro-sub{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--ink-dim);
    animation: introBlink 0.9s steps(1) infinite;
  }
  @keyframes introBlink{
    0%, 49%{ opacity: 1; }
    50%, 100%{ opacity: 0.2; }
  }

  /* ===== Animação ao rolar (fade-in) ===== */
  .reveal{
    opacity: 0;
    transform: translateY(36px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .reveal.visible{
    opacity: 1;
    transform: translateY(0);
  }
  @media (prefers-reduced-motion: reduce){
    .reveal{ opacity: 1; transform: none; transition: none; }
  }

  /* ===== Text Cursor Trail ===== */
  .cursor-word{
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 9999;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    white-space: nowrap;
    color: #0F0;
    text-shadow: 0 0 6px #0F0, 0 0 12px rgba(0,255,0,0.5);
    animation: cursorWordFade 0.9s ease-out forwards;
    will-change: transform, opacity;
  }
  @keyframes cursorWordFade{
    0%{ opacity: 0.9; transform: translate(-50%, -50%) translateY(0) scale(1); }
    100%{ opacity: 0; transform: translate(-50%, -50%) translateY(-18px) scale(0.85); }
  }
</style>
</head>
<body>

<div id="intro-overlay">
  <div id="intro-text" data-text="SMASHEZ">SMASHEZ</div>
  <div id="intro-sub">CONECTANDO AO SISTEMA...</div>
</div>

<canvas id="matrix"></canvas>
<canvas id="ash"></canvas>

<audio id="bg-music">
  Seu navegador não suporta áudio.
</audio>
<button id="music-btn">▶ Música</button>
<button id="next-btn">⏭</button>

<div id="volume-container">
  <span id="volume-icon">🔊</span>
  <input type="range" id="volume-slider" min="0" max="1" step="0.01">
</div>

<section class="hero">
  <img class="hero-img" id="heroImg" src="fotos/foto1.jpg" alt="Cena principal">
</section>

<section class="strip-section">
  <div class="strip-wrap reveal" id="stripPanel">
    <button class="arrow" id="arrowLeft">◀</button>
    <div class="strip" id="strip">
      <img class="thumb active" src="fotos/foto1.jpg" data-full="fotos/foto1.jpg" data-track="0">
      <img class="thumb" src="fotos/foto2.jpg" data-full="fotos/foto2.jpg" data-track="1">
      <img class="thumb" src="fotos/foto3.jpg" data-full="fotos/foto3.jpg" data-track="2">
      <img class="thumb" src="fotos/foto4.jpg" data-full="fotos/foto4.jpg" data-track="3">
      <img class="thumb" src="fotos/foto5.jpg" data-full="fotos/foto5.jpg" data-track="4">
      <img class="thumb" src="fotos/foto6.jpg" data-full="fotos/foto6.jpg" data-track="5">
      <img class="thumb" src="fotos/foto7.jpg" data-full="fotos/foto7.jpg" data-track="6">
    </div>
    <button class="arrow" id="arrowRight">▶</button>
  </div>
  <div class="drag-hint mono">← ARRASTE COM O MOUSE →</div>
</section>

<section class="section" id="trailer-section" style="padding-bottom:20px;">
  <div class="section-head reveal" style="justify-content:center; text-align:center;">
    <h2>Trailer</h2>
  </div>
  <div class="player reveal" id="player">
    <img src="trailer/capa.jpg" alt="Capa do trailer">
    <video id="trailerVideo" loop muted playsinline>
      <source src="trailer/trailer.mp4" type="video/mp4">
    </video>
    <div class="play-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    </div>
  </div>
  <div class="hero-content reveal" style="margin-top:24px;">
    <h1 id="heroName" data-text="Smashez" style="font-size:clamp(32px,6vw,64px);">Smashez</h1>
    <div class="sub-label">ACERVO</div>
  </div>
</section>

<section class="section" id="galeria-section" style="padding-top:20px;">
  <div class="section-head reveal" style="justify-content:center; text-align:center;">
    <h2>Galeria</h2>
  </div>
  <div class="gallery reveal" id="gallery"></div>
  <div class="load-more-wrap">
    <button class="load-more mono" id="loadMoreBtn">CARREGAR MAIS FOTOS<span class="neon-ripple"></span></button>
  </div>
</section>

<script>
/* ===== Animação ao rolar (fade-in) ===== */
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
      revealObserver.unobserve(entry.target);
    }
  });
}, { threshold: 0.15 });

document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

/* ===== Tela de entrada (Glitch Intro) ===== */
window.addEventListener('load', () => {
  const introOverlay = document.getElementById('intro-overlay');
  setTimeout(() => {
    introOverlay.classList.add('hidden');
    setTimeout(() => introOverlay.remove(), 700);
  }, 1600);
});

/* ===== Efeito Matrix (fundo) ===== */
const matrixCanvas = document.getElementById('matrix');
const mctx = matrixCanvas.getContext('2d');
const letters = "01ABCDEFGHIJKLMNOPQRSTUVXYZ@#$%&*";
const fontSize = 16;
let columns, drops;
let matrixColor = "#0F0";

function resizeMatrix(){
  matrixCanvas.width = window.innerWidth;
  matrixCanvas.height = window.innerHeight;
  columns = Math.floor(matrixCanvas.width / fontSize);
  drops = [];
  for(let x = 0; x < columns; x++){ drops[x] = 1; }
}
resizeMatrix();
window.addEventListener('resize', resizeMatrix);

function drawMatrix(){
  mctx.fillStyle = "rgba(0, 0, 0, 0.05)";
  mctx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
  mctx.fillStyle = matrixColor;
  mctx.font = fontSize + "px monospace";
  for(let i = 0; i < drops.length; i++){
    const text = letters.charAt(Math.floor(Math.random() * letters.length));
    mctx.fillText(text, i * fontSize, drops[i] * fontSize);
    if(drops[i] * fontSize > matrixCanvas.height && Math.random() > 0.975){ drops[i] = 0; }
    drops[i]++;
  }
}
setInterval(drawMatrix, 35);

/* alterna cor verde/vermelho a cada 50s */
const segundos = 50;
const musicBtn = document.getElementById('music-btn');
const nextBtn = document.getElementById('next-btn');
const heroName = document.getElementById('heroName');
const playerPanel = document.getElementById('player');
const stripPanel = document.getElementById('stripPanel');
const loadMoreNeon = document.getElementById('loadMoreBtn');
const volumeContainer = document.getElementById('volume-container');
const volumeIconEl = document.getElementById('volume-icon');

function applyNeon(hex, glow){
  heroName.style.color = hex;

/* música play/pause + playlist */
const music = document.getElementById('bg-music');
let playing = false;

const playlist = [
  "mp3/musica1.mp3",
  "mp3/musica2.mp3",
  "mp3/musica3.mp3",
  "mp3/musica4.mp3",
  "mp3/musica5.mp3",
  "mp3/musica6.mp3",
  "mp3/musica7.mp3",
  "mp3/musica8.mp3"
];
let currentTrack = 0;
music.src = playlist[currentTrack];

function nextTrack(){
  currentTrack = (currentTrack + 1) % playlist.length;
  music.src = playlist[currentTrack];
  if(playing) music.play().catch(() => {});
}

function startMusic(){
  if(playing) return;
  music.play().then(() => {
    musicBtn.textContent = "⏸ Música";
    playing = true;
  }).catch(() => { /* autoplay bloqueado pelo navegador, aguarda interação */ });
}

musicBtn.addEventListener('click', () => {
  if(!playing){
    startMusic();
  } else {
    music.pause();
    musicBtn.textContent = "▶ Música";
    playing = false;
  }
});

nextBtn.addEventListener('click', nextTrack);
music.addEventListener('ended', nextTrack);

/* ===== Volume ===== */
const volumeSlider = document.getElementById('volume-slider');
const volumeIcon = document.getElementById('volume-icon');

volumeSlider.value = 0.5;
music.volume = 0.5;

volumeSlider.addEventListener('input', () => {
  music.volume = volumeSlider.value;
  if (volumeSlider.value == 0) {
    volumeIcon.textContent = "🔇";
  } else if (volumeSlider.value < 0.5) {
    volumeIcon.textContent = "🔉";
  } else {
    volumeIcon.textContent = "🔊";
  }
});

/* tenta tocar assim que a página carrega */
window.addEventListener('DOMContentLoaded', startMusic);

/* se o navegador bloquear o autoplay, inicia no primeiro clique/toque em qualquer lugar da página */
function unlockOnFirstInteraction(){
  startMusic();
  document.removeEventListener('click', unlockOnFirstInteraction);
  document.removeEventListener('touchstart', unlockOnFirstInteraction);
  document.removeEventListener('keydown', unlockOnFirstInteraction);
}
document.addEventListener('click', unlockOnFirstInteraction);
document.addEventListener('touchstart', unlockOnFirstInteraction);
document.addEventListener('keydown', unlockOnFirstInteraction);

const ash = document.getElementById('ash');
const actx = ash.getContext('2d');
function resizeAsh(){ ash.width = innerWidth; ash.height = innerHeight; }
resizeAsh();
window.addEventListener('resize', resizeAsh);
const particles = Array.from({length: 60}, () => ({
  x: Math.random()*innerWidth,
  y: Math.random()*innerHeight,
  r: Math.random()*1.6 + 0.4,
  s: Math.random()*0.4 + 0.1
}));
function drawAsh(){
  actx.clearRect(0,0,ash.width,ash.height);
  actx.fillStyle = '#E8E4D9';
  particles.forEach(p=>{
    actx.globalAlpha = Math.random()*0.5 + 0.1;
    actx.beginPath();
    actx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    actx.fill();
    p.y -= p.s;
    p.x += Math.sin(p.y*0.01)*0.2;
    if(p.y < -10){ p.y = innerHeight + 10; p.x = Math.random()*innerWidth; }
  });
  requestAnimationFrame(drawAsh);
}
drawAsh();

const heroImg = document.getElementById('heroImg');
const strip = document.getElementById('strip');
const thumbs = strip.querySelectorAll('.thumb');

thumbs.forEach(t => {
  t.addEventListener('click', () => {
    thumbs.forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    heroImg.style.opacity = 0;
    setTimeout(()=>{ heroImg.src = t.dataset.full; heroImg.style.opacity = 1; }, 200);

    /* toca a faixa de música associada a essa foto */
    const trackIndex = parseInt(t.dataset.track, 10);
    if(!isNaN(trackIndex) && trackIndex !== currentTrack){
      currentTrack = trackIndex;
      music.src = playlist[currentTrack];
      music.play().then(() => {
        musicBtn.textContent = "⏸ Música";
        playing = true;
      }).catch(() => {});
    }
  });
});

document.getElementById('arrowLeft').onclick = () => strip.scrollBy({left: -300, behavior:'smooth'});
document.getElementById('arrowRight').onclick = () => strip.scrollBy({left: 300, behavior:'smooth'});

let isDown = false, startX, scrollLeft;
strip.addEventListener('mousedown', e => {
  isDown = true;
  strip.classList.add('dragging');
  startX = e.pageX - strip.offsetLeft;
  scrollLeft = strip.scrollLeft;
});
['mouseleave','mouseup'].forEach(ev => strip.addEventListener(ev, () => {
  isDown = false;
  strip.classList.remove('dragging');
}));
strip.addEventListener('mousemove', e => {
  if(!isDown) return;
  e.preventDefault();
  const x = e.pageX - strip.offsetLeft;
  strip.scrollLeft = scrollLeft - (x - startX) * 1.4;
});

const gallery = document.getElementById('gallery');
const loadMoreBtn = document.getElementById('loadMoreBtn');
const TOTAL_FOTOS_GALERIA = 12; /* <-- troque esse número pela quantidade real de fotos que você tem na pasta galeria/ */
let loaded = 0;
const BATCH = 8;

function loadBatch(){
  const next = [];
  for(let i = loaded; i < Math.min(loaded + BATCH, TOTAL_FOTOS_GALERIA); i++){
    next.push(i + 1); /* numeração das fotos: galeria/foto1.jpg, foto2.jpg... */
  }
  next.forEach((num, i) => {
    const img = document.createElement('img');
    img.src = `galeria/foto${num}.jpg`;
    img.style.animationDelay = (i*0.05)+'s';
    applyTilt(img);
    gallery.appendChild(img);
  });
  loaded += next.length;
  if(loaded >= TOTAL_FOTOS_GALERIA){
    loadMoreBtn.disabled = true;
    loadMoreBtn.textContent = 'FIM DO ARQUIVO';
  }
}
loadMoreBtn.addEventListener('click', loadBatch);
loadMoreBtn.addEventListener('click', () => {
  loadMoreBtn.classList.remove('neon-tap');
  void loadMoreBtn.offsetWidth; /* força reflow pra reiniciar a animação */
  loadMoreBtn.classList.add('neon-tap');
});
loadBatch();

/* ===== Efeito 3D Tilt nas fotos da galeria ===== */
function applyTilt(img){
  const MAX_TILT = 12; /* graus máximos de inclinação */
  const SCALE = 1.05;

  img.addEventListener('mousemove', (e) => {
    const rect = img.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const percentX = (x / rect.width) - 0.5;
    const percentY = (y / rect.height) - 0.5;

    const rotateY = percentX * MAX_TILT * 2;
    const rotateX = percentY * -MAX_TILT * 2;

    img.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(${SCALE})`;
  });

  img.addEventListener('mouseleave', () => {
    img.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)';
  });
}

/* ===== Text Cursor Trail ===== */
const trailWords = ["código"];
let trailIndex = 0;
let lastTrailTime = 0;
const trailInterval = 55; /* ms entre palavras, pra ficar elegante e não poluído */

document.addEventListener('mousemove', (e) => {
  const now = Date.now();
  if(now - lastTrailTime < trailInterval) return;
  lastTrailTime = now;

  const word = document.createElement('span');
  word.className = 'cursor-word';
  word.textContent = trailWords[trailIndex % trailWords.length];
  trailIndex++;

  const offsetX = (Math.random() - 0.5) * 10;
  const offsetY = (Math.random() - 0.5) * 10;
  word.style.left = (e.clientX + offsetX) + "px";
  word.style.top = (e.clientY + offsetY) + "px";
  word.style.color = matrixColor;
  word.style.textShadow = `0 0 6px ${matrixColor}, 0 0 12px ${matrixColor}`;

  document.body.appendChild(word);
  word.addEventListener('animationend', () => word.remove());
});
