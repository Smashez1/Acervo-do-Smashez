<style>

body {

/* 🔐 LOGIN HACKER */
#login-screen {

}

#terminal {

}

/* MATRIX */
canvas {

/* BOTÕES */

  font-weight: bold;

#music-btn { left: 50%; transform: translateX(-110%); }
#next-btn { left: 50%; transform: translateX(10%); }

/* 🔊 VOLUME */
#volume-container {
  position: fixed;

  left: 50%;

  align-items: center;

  z-index: 1000;

#volume-icon {
  color: var(--accent);
  font-size: 18px;
}

#volume-slider {
  width: 100px;
  cursor: pointer;
}

/* PERFIL */
#links-panel {
  position: fixed;
  top: 42%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.profile-container {
  position: relative;
  width: 360px;
  height: 210px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 20px var(--accent);
  margin-bottom: 39px; /* espaço abaixo do painel */
}

.profile-banner {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.profile-img {
  position: absolute;
  width: 140px;
  height: 140px;
  border-radius: 50%;
  border: 3px solid var(--accent);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* LINKS */
#links-panel a {
  color: var(--accent);
  text-decoration: none;
  border: 1px solid var(--accent);
  padding: 8px 12px;
  border-radius: 6px;
  min-width: 200px;
  text-align: center;
  transition: 0.3s;
}

/* 🔥 EFEITO NEON */
#links-panel a:hover {
  color: #fff;
  box-shadow: 0 0 10px var(--accent),
              0 0 20px var(--accent),
              0 0 40px var(--accent);
  text-shadow: 0 0 5px #fff,
               0 0 10px var(--accent);
  transform: scale(1.05);
}

#chat-box {
  position: fixed;
  left: 20px;
  bottom: 20px;
  width: 320px;
  height: 240px;
  border: 1px solid var(--accent);

  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(4px);
  border-radius: 8px;
}

#chat-header {
  color: var(--accent);
  padding: 5px;
}

#chat-messages {
  height: 200px;
  overflow-y: auto;
  font-size: 12px;
}

.msg {
  margin: 4px;
  color: #FFF;
  text-shadow: 0 0 3px rgba(255,255,255,0.3);
}

</style>

<script>
// 🔐 LOGIN HACKER SCRIPT
const terminal = document.getElementById("terminal");

const lines = [
  "Iniciando sistema...",
  "Conectando ao servidor...",
  "Bypass firewall...",
  "Acessando banco de dados...",
  "Usuário encontrado: admin",
  "Quebrando senha...",
  "Senha descoberta: ********",
  "Autenticando...",
  "ACESSO LIBERADO ✔"
];

let lineIndex = 0;
let charIndex = 0;

function typeEffect() {
  if (lineIndex < lines.length) {
    if (charIndex < lines[lineIndex].length) {
      terminal.textContent += lines[lineIndex].charAt(charIndex);
      charIndex++;
      setTimeout(typeEffect, 40);
    } else {
      terminal.textContent += "\n";
      lineIndex++;
      charIndex = 0;
      setTimeout(typeEffect, 300);
    }
  } else {
    setTimeout(() => {
      document.getElementById("login-screen").style.display = "none";
    }, 1000);
  }
}

typeEffect();

// MATRIX
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&*";
const fontSize = 16;
let columns = canvas.width / fontSize;
let drops = Array(Math.floor(columns)).fill(1);

let color = "#0F0";

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = color;
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if (drops[i]*fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }
    drops[i]++;
  }
}
setInterval(draw, 50);

// TROCA COR
setInterval(() => {
  color = (color === "#0F0") ? "#F00" : "#0F0";
  document.documentElement.style.setProperty('--accent', color);
}, 40000);

// PLAYLIST
const playlist = ["musica1.mp3","musica2.mp3","musica3.mp3","musica4.mp3","musica5.mp3","musica6.mp3","musica7.mp3","musica8.mp3"];
let currentTrack = 0;

const player = document.getElementById("bg-music");
const btn = document.getElementById("music-btn");
const nextBtn = document.getElementById("next-btn");

player.src = playlist[currentTrack];

let playing = false;

btn.addEventListener("click", async () => {
  if (!playing) {
    await player.play();
    btn.textContent = "⏸ Música";
    playing = true;
  } else {
    player.pause();
    btn.textContent = "▶ Música";
    playing = false;
  }
});

function nextTrack() {
  currentTrack = (currentTrack + 1) % playlist.length;
  player.src = playlist[currentTrack];
  if (playing) player.play();
}

nextBtn.addEventListener("click", nextTrack);
player.addEventListener("ended", nextTrack);

 /* ====== CHAT AUTOMÁTICO (seu script + mais falas) ====== */

    ];

    const mensagensLoop = [
      "<b>Fuscona:</b> quero tomar pirula vermelha ",

// 🔊 VOLUME SCRIPT
const volumeSlider = document.getElementById("volume-slider");
const volumeIcon = document.getElementById("volume-icon");

volumeSlider.value = 0.5;
player.volume = 0.5;

volumeSlider.addEventListener("input", () => {
  player.volume = volumeSlider.value;

  if (volumeSlider.value == 0) {
    volumeIcon.textContent = "🔇";
  } else if (volumeSlider.value < 0.5) {
    volumeIcon.textContent = "🔉";
  } else {
    volumeIcon.textContent = "🔊";
  }
});

    const chatBox = document.getElementById("chat-messages");
    let index = 0;
    let loopIndex = 0;

    function addMensagem() {
      const msg = document.createElement("div");
      msg.classList.add("msg");

      if (index < mensagens.length) {
        msg.innerHTML = mensagens[index];
        index++;
      } else {
        msg.innerHTML = mensagensLoop[loopIndex];
        loopIndex++;
        if (loopIndex >= mensagensLoop.length) {
          loopIndex = 0; // reinicia o loop
        }
      }

      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight; // rola pra baixo
    }

    // adiciona uma mensagem a cada 5 segundos
    setInterval(addMensagem, 5000);
  
  </script>
